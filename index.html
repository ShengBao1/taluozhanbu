<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>罗密欧与朱丽叶 · 命运塔罗</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap');

    :root {
      --gold: #d4af37;
      --rose: #f472b6;
      --purple: #7c3aed;
      --dark: #0d0618;
      --cream: #f0e6d3;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at 50% 0%, #1a0a2e 0%, #0d0618 60%, #000 100%);
      min-height: 100vh;
      font-family: 'Cinzel', serif;
      color: var(--cream);
      overflow-x: hidden;
    }

    /* ===== PARTICLES ===== */
    #particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: float linear infinite;
      pointer-events: none;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    /* ===== SCREENS ===== */
    .screen {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .screen.active { display: flex; }

    /* ===== INTRO SCREEN ===== */
    #intro {
      text-align: center;
      gap: 20px;
    }

    .title-main {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      color: var(--gold);
      text-shadow: 0 0 30px rgba(212,175,55,0.8), 0 0 60px rgba(212,175,55,0.4);
      letter-spacing: 4px;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 30px rgba(212,175,55,0.8), 0 0 60px rgba(212,175,55,0.4); }
      50% { text-shadow: 0 0 50px rgba(212,175,55,1), 0 0 100px rgba(212,175,55,0.6); }
    }

    .title-sub {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      color: #b8a0c8;
      letter-spacing: 3px;
    }

    .divider-ornament {
      display: flex;
      align-items: center;
      gap: 15px;
      width: 100%;
      max-width: 400px;
      margin: 10px auto;
    }
    .divider-ornament::before,
    .divider-ornament::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }
    .divider-ornament span { color: var(--gold); font-size: 1.2rem; }

    .intro-text {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 1rem;
      color: #c8b8d8;
      max-width: 500px;
      line-height: 1.8;
      text-align: center;
    }

    .candle-row {
      display: flex;
      gap: 40px;
      margin: 20px 0;
    }

    .candle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .flame {
      width: 12px;
      height: 20px;
      background: radial-gradient(ellipse at 50% 80%, #fbbf24, #f97316, transparent);
      border-radius: 50% 50% 30% 30%;
      animation: flicker 1.5s ease-in-out infinite alternate;
      filter: blur(1px);
      box-shadow: 0 0 10px #fbbf24, 0 0 20px #f97316;
    }

    @keyframes flicker {
      0% { transform: scaleX(1) scaleY(1) rotate(-2deg); opacity: 0.9; }
      50% { transform: scaleX(0.85) scaleY(1.1) rotate(2deg); opacity: 1; }
      100% { transform: scaleX(1.1) scaleY(0.95) rotate(-1deg); opacity: 0.85; }
    }

    .candle-body {
      width: 14px;
      height: 60px;
      background: linear-gradient(to right, #f0e6d3, #fff, #e0d0c0);
      border-radius: 2px;
    }

    .candle-base {
      width: 20px;
      height: 8px;
      background: linear-gradient(to right, #d4af37, #fbbf24, #d4af37);
      border-radius: 2px;
    }

    /* ===== BUTTONS ===== */
    .btn-primary {
      background: linear-gradient(135deg, #2d1b4e, #4a1942);
      border: 1.5px solid var(--gold);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      letter-spacing: 3px;
      padding: 14px 40px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.2), transparent);
      transition: left 0.5s;
    }

    .btn-primary:hover::before { left: 100%; }
    .btn-primary:hover {
      background: linear-gradient(135deg, #4a1942, #6b2d5e);
      box-shadow: 0 0 20px rgba(212,175,55,0.4);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid #7a6a8a;
      color: #b8a0c8;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 2px;
      padding: 10px 28px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s;
    }
    .btn-secondary:hover {
      border-color: var(--rose);
      color: var(--rose);
    }

    /* ===== SHUFFLE SCREEN ===== */
    #shuffle {
      gap: 30px;
      text-align: center;
    }

    .shuffle-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(1.2rem, 3vw, 2rem);
      color: var(--gold);
      letter-spacing: 3px;
    }

    .shuffle-instruction {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      color: #b8a0c8;
      font-size: 1rem;
      max-width: 400px;
    }

    .deck-area {
      position: relative;
      width: 160px;
      height: 260px;
      margin: 20px auto;
      cursor: pointer;
    }

    .deck-card {
      position: absolute;
      width: 140px;
      height: 240px;
      border-radius: 12px;
      background: linear-gradient(135deg, #1a0a2e, #2d1b4e, #1a0a2e);
      border: 1.5px solid var(--gold);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      transition: all 0.3s;
    }

    .deck-card::before {
      content: '✦';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2rem;
      color: var(--gold);
      opacity: 0.5;
    }

    .deck-area:hover .deck-card:last-child {
      transform: translate(-50%, -55%) rotate(-3deg);
      box-shadow: 0 10px 30px rgba(212,175,55,0.3);
    }

    .shuffle-count {
      font-size: 0.85rem;
      color: #7a6a8a;
      letter-spacing: 2px;
    }

    /* ===== SPREAD SCREEN ===== */
    #spread {
      gap: 20px;
      text-align: center;
    }

    .spread-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      color: var(--gold);
      letter-spacing: 2px;
    }

    .spread-subtitle {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      color: #b8a0c8;
      font-size: 0.9rem;
    }

    .three-spread {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
      margin: 10px 0;
    }

    .spread-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .spread-label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--gold);
      text-transform: uppercase;
    }

    .spread-label-cn {
      font-size: 0.75rem;
      color: #b8a0c8;
      font-family: 'IM Fell English', serif;
      font-style: italic;
    }

    .tarot-card {
      width: 120px;
      height: 200px;
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tarot-card.flipped { transform: rotateY(180deg); }

    .tarot-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    .tarot-face, .tarot-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 10px;
      border: 1.5px solid var(--gold);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .tarot-back {
      background: linear-gradient(135deg, #1a0a2e, #2d1b4e, #1a0a2e);
      cursor: pointer;
    }

    .tarot-back::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 6px;
    }

    .tarot-back-symbol {
      font-size: 2.5rem;
      color: var(--gold);
      opacity: 0.6;
      text-shadow: 0 0 15px rgba(212,175,55,0.5);
    }

    .tarot-face {
      background: linear-gradient(135deg, #0d0618, #1a0a2e);
      transform: rotateY(180deg);
      text-align: center;
      gap: 6px;
    }

    .card-num {
      font-size: 0.6rem;
      color: var(--gold);
      letter-spacing: 2px;
    }

    .card-icon {
      font-size: 2.2rem;
      filter: drop-shadow(0 0 8px currentColor);
    }

    .card-name-en {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 0.5rem;
      color: var(--gold);
      letter-spacing: 1px;
      text-align: center;
    }

    .card-name-cn {
      font-size: 0.85rem;
      color: var(--cream);
      letter-spacing: 3px;
    }

    .card-theme {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 0.6rem;
      color: #b8a0c8;
      text-align: center;
      line-height: 1.4;
    }

    .card-divider {
      width: 60%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }

    /* ===== READING SCREEN ===== */
    #reading {
      gap: 25px;
      max-width: 800px;
      margin: 0 auto;
    }

    .reading-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(1rem, 2.5vw, 1.8rem);
      color: var(--gold);
      letter-spacing: 3px;
      text-align: center;
      text-shadow: 0 0 20px rgba(212,175,55,0.5);
    }

    .reading-cards-row {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .reading-card-mini {
      width: 90px;
      height: 150px;
      border-radius: 8px;
      border: 1.5px solid var(--gold);
      background: linear-gradient(135deg, #0d0618, #1a0a2e);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 8px;
      text-align: center;
    }

    .reading-card-mini .card-icon { font-size: 1.8rem; }
    .reading-card-mini .card-name-cn { font-size: 0.75rem; letter-spacing: 2px; }
    .reading-card-mini .card-name-en { font-size: 0.42rem; }
    .reading-card-mini .spread-label { font-size: 0.55rem; }

    .reading-sections {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
    }

    .reading-section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 12px;
      padding: 20px 25px;
      position: relative;
      overflow: hidden;
    }

    .reading-section::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    }

    .reading-section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .reading-section-icon { font-size: 1.4rem; }

    .reading-section-title {
      font-size: 0.8rem;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .reading-section-card {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: #b8a0c8;
      margin-bottom: 8px;
    }

    .reading-section-text {
      font-family: 'IM Fell English', serif;
      font-size: 0.95rem;
      color: var(--cream);
      line-height: 1.8;
    }

    .reading-overall {
      background: linear-gradient(135deg, rgba(212,175,55,0.05), rgba(124,58,237,0.05));
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 12px;
      padding: 20px 25px;
      text-align: center;
    }

    .reading-overall-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 0.9rem;
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .reading-overall-text {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--cream);
      line-height: 1.9;
    }

    .quote-mark {
      font-size: 2rem;
      color: var(--gold);
      opacity: 0.4;
      line-height: 0.5;
      vertical-align: -0.5em;
    }

    .btn-row {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeInUp 0.8s ease forwards; }
    .fade-in-delay-1 { animation: fadeInUp 0.8s ease 0.2s forwards; opacity: 0; }
    .fade-in-delay-2 { animation: fadeInUp 0.8s ease 0.4s forwards; opacity: 0; }
    .fade-in-delay-3 { animation: fadeInUp 0.8s ease 0.6s forwards; opacity: 0; }
    .fade-in-delay-4 { animation: fadeInUp 0.8s ease 0.8s forwards; opacity: 0; }

    /* ===== PROGRESS DOTS ===== */
    .progress-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 10px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3a2a4a;
      transition: all 0.3s;
    }
    .dot.active { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
    .dot.done { background: #7a5a2a; }

    /* ===== MOON PHASE ===== */
    .moon-phase {
      font-size: 3rem;
      animation: moon-rotate 8s ease-in-out infinite;
    }
    @keyframes moon-rotate {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }

    /* ===== ROSE PETALS ===== */
    .petal {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      font-size: 1rem;
      animation: petal-fall linear infinite;
      opacity: 0;
    }
    @keyframes petal-fall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.3; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d0618; }
    ::-webkit-scrollbar-thumb { background: #3a2a4a; border-radius: 3px; }
  </style>
</head>
<body>

<div id="particles"></div>

<!-- ===== SCREEN 1: INTRO ===== -->
<div class="screen active" id="intro">
  <div class="progress-dots">
    <div class="dot active" id="dot1"></div>
    <div class="dot" id="dot2"></div>
    <div class="dot" id="dot3"></div>
    <div class="dot" id="dot4"></div>
  </div>

  <div class="candle-row fade-in">
    <div class="candle">
      <div class="flame"></div>
      <div class="candle-body"></div>
      <div class="candle-base"></div>
    </div>
    <div class="moon-phase">🌙</div>
    <div class="candle">
      <div class="flame" style="animation-delay:0.7s"></div>
      <div class="candle-body" style="height:45px"></div>
      <div class="candle-base"></div>
    </div>
  </div>

  <h1 class="title-main fade-in-delay-1">Romeo & Juliet</h1>
  <p class="title-sub fade-in-delay-1">命 运 塔 罗</p>

  <div class="divider-ornament fade-in-delay-2"><span>✦</span></div>

  <p class="intro-text fade-in-delay-2">
    "Two households, both alike in dignity..."<br><br>
    星辰注定的爱人，以生命为代价的誓言。<br>
    让塔罗揭示你此刻的命运轨迹。
  </p>

  <div class="divider-ornament fade-in-delay-3"><span>🌹</span></div>

  <button class="btn-primary fade-in-delay-3" onclick="goToShuffle()">
    ✦ 开始占卜 ✦
  </button>

  <p class="fade-in-delay-4" style="font-size:0.7rem;color:#5a4a6a;letter-spacing:2px;margin-top:10px;">
    过去 · 现在 · 未来 三牌阵
  </p>
</div>

<!-- ===== SCREEN 2: SHUFFLE ===== -->
<div class="screen" id="shuffle">
  <div class="progress-dots">
    <div class="dot done"></div>
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <h2 class="shuffle-title fade-in">洗 牌 仪 式</h2>
  <p class="shuffle-instruction fade-in-delay-1">
    闭上双眼，将你的问题或心事<br>注入指尖，然后点击牌堆洗牌。
  </p>

  <div class="deck-area" onclick="shuffleDeck()">
    <div class="deck-card" style="transform:translate(-50%,-50%) rotate(-8deg) translateX(-8px)"></div>
    <div class="deck-card" style="transform:translate(-50%,-50%) rotate(-4deg) translateX(-4px)"></div>
    <div class="deck-card" style="transform:translate(-50%,-50%) rotate(0deg)"></div>
    <div class="deck-card" style="transform:translate(-50%,-50%) rotate(4deg) translateX(4px)"></div>
    <div class="deck-card" style="transform:translate(-50%,-50%) rotate(8deg) translateX(8px)"></div>
  </div>

  <p class="shuffle-count" id="shuffleCount">点击牌堆洗牌（建议3次）</p>

  <button class="btn-primary" id="cutBtn" style="display:none" onclick="goToSpread()">
    ✦ 切牌，揭示命运 ✦
  </button>
  <button class="btn-secondary" onclick="goBack('intro')">← 返回</button>
</div>

<!-- ===== SCREEN 3: SPREAD ===== -->
<div class="screen" id="spread">
  <div class="progress-dots">
    <div class="dot done"></div>
    <div class="dot done"></div>
    <div class="dot active"></div>
    <div class="dot"></div>
  </div>

  <h2 class="spread-title fade-in">✦ 命运三牌阵 ✦</h2>
  <p class="spread-subtitle fade-in-delay-1">点击每张牌，揭示命运</p>

  <div class="three-spread fade-in-delay-2">
    <div class="spread-slot">
      <div class="spread-label">Past</div>
      <div class="spread-label-cn">过去</div>
      <div class="tarot-card" id="card0" onclick="flipCard(0)">
        <div class="tarot-card-inner">
          <div class="tarot-back">
            <div class="tarot-back-symbol">✦</div>
          </div>
          <div class="tarot-face" id="face0"></div>
        </div>
      </div>
    </div>

    <div class="spread-slot" style="margin-top:-20px;">
      <div class="spread-label">Present</div>
      <div class="spread-label-cn">现在</div>
      <div class="tarot-card" id="card1" onclick="flipCard(1)">
        <div class="tarot-card-inner">
          <div class="tarot-back">
            <div class="tarot-back-symbol">✦</div>
          </div>
          <div class="tarot-face" id="face1"></div>
        </div>
      </div>
    </div>

    <div class="spread-slot">
      <div class="spread-label">Future</div>
      <div class="spread-label-cn">未来</div>
      <div class="tarot-card" id="card2" onclick="flipCard(2)">
        <div class="tarot-card-inner">
          <div class="tarot-back">
            <div class="tarot-back-symbol">✦</div>
          </div>
          <div class="tarot-face" id="face2"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="revealBtn" style="display:none;flex-direction:column;align-items:center;gap:12px;">
    <button class="btn-primary" onclick="goToReading()">✦ 解读命运 ✦</button>
    <button class="btn-secondary" onclick="goBack('shuffle')">← 重新洗牌</button>
  </div>
</div>

<!-- ===== SCREEN 4: READING ===== -->
<div class="screen" id="reading">
  <div class="progress-dots">
    <div class="dot done"></div>
    <div class="dot done"></div>
    <div class="dot done"></div>
    <div class="dot active"></div>
  </div>

  <h2 class="reading-title fade-in">✦ 命运解读 ✦</h2>

  <div class="reading-cards-row fade-in-delay-1" id="readingCardsRow"></div>

  // ===== STATE =====
  let shuffleCount = 0;

  let flippedCount = 0;

  // ===== PARTICLES =====
  function createParticles() {
    const container = document.getElementById('particles');
    const colors = ['#d4af37','#f472b6','#a78bfa','#93c5fd','#fff'];
    for(let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 3 + 1;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${Math.random()*15+10}s;
        animation-delay:${Math.random()*10}s;
        opacity:0;
      `;
      container.appendChild(p);
    }
    // Rose petals
    for(let i = 0; i < 8; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.textContent = '🌹';
      p.style.cssText = `
        left:${Math.random()*100}%;
        font-size:${Math.random()*0.8+0.6}rem;
        animation-duration:${Math.random()*12+8}s;
        animation-delay:${Math.random()*15}s;
      `;
      document.body.appendChild(p);
    }
  }

  // ===== NAVIGATION =====
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
  }

  function goBack(screenId) { showScreen(screenId); }

  function goToShuffle() {
    shuffleCount = 0;
    document.getElementById('shuffleCount').textContent = '点击牌堆洗牌（建议3次）';
    document.getElementById('cutBtn').style.display = 'none';
    updateDots(2);
    showScreen('shuffle');
  }

  function updateDots(active) {
    for(let i=1;i<=4;i++){
      const d = document.getElementById('dot'+i);
      if(d){
        d.className = 'dot';
        if(i < active) d.classList.add('done');
        else if(i === active) d.classList.add('active');
      }
    }
  }

  // ===== SHUFFLE =====
  function shuffleDeck() {
    shuffleCount++;
    const cards = document.querySelectorAll('.deck-card');
    cards.forEach((c, i) => {
      const r = (Math.random()-0.5)*30;
      const tx = (Math.random()-0.5)*20;
      const ty = (Math.random()-0.5)*10;
      c.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) rotate(${r}deg)`;
      setTimeout(() => {
        const baseR = [-8,-4,0,4,8][i];
        const baseTx = [-8,-4,0,4,8][i];
        c.style.transform = `translate(calc(-50% + ${baseTx}px), -50%) rotate(${baseR}deg)`;
      }, 400);
    });

    const msgs = ['', '再洗一次...', '再洗一次...', '✦ 可以切牌了 ✦', '✦ 可以切牌了 ✦'];
    document.getElementById('shuffleCount').textContent =
      `已洗牌 ${shuffleCount} 次 ${shuffleCount >= 3 ? '— 命运已注入牌中' : msgs[shuffleCount]}`;

    if(shuffleCount >= 3) {
      document.getElementById('cutBtn').style.display = 'block';
    }
  }

  // ===== DRAW CARDS =====
  function drawCards() {
    const shuffled = [...tarotDeck].sort(() => Math.random() - 0.5);
    drawnCards = shuffled.slice(0, 3);
  }

  function goToSpread() {
    drawCards();
    flippedCount = 0;
    document.getElementById('revealBtn').style.display = 'none';

    // Build card faces
    drawnCards.forEach((card, i) => {
      const face = document.getElementById('face'+i);
      face.innerHTML = `
        <div class="card-num">${card.num}</div>
        <div class="card-icon" style="color:${card.color}">${card.icon}</div>
        <div class="card-divider"></div>
        <div class="card-name-en">${card.en}</div>
        <div class="card-name-cn">${card.cn}</div>
        <div class="card-divider"></div>
        <div class="card-theme">${card.theme}</div>
      `;
      // Reset flip
      document.getElementById('card'+i).classList.remove('flipped');
    });

    updateDots(3);
    showScreen('spread');
  }

  function flipCard(idx) {
    const card = document.getElementById('card'+idx);
    if(!card.classList.contains('flipped')) {
      card.classList.add('flipped');
      flippedCount++;
      if(flippedCount === 3) {
        setTimeout(() => {
          document.getElementById('revealBtn').style.display = 'flex';
        }, 600);
      }
    }
  }

  // ===== READING =====
  function goToReading() {
    const positions = ['过去', '现在', '未来'];
    const posIcons = ['🕰️', '🌹', '⭐'];
    const posEN = ['Past', 'Present', 'Future'];

    // Mini cards row
    const row = document.getElementById('readingCardsRow');
    row.innerHTML = '';
    drawnCards.forEach((card, i) => {
      row.innerHTML += `
        <div class="reading-card-mini" style="border-color:${card.color}">
          <div class="spread-label" style="color:${card.color}">${posEN[i]}</div>
          <div class="card-icon" style="color:${card.color}">${card.icon}</div>
          <div class="card-name-cn">${card.cn}</div>
          <div class="card-name-en">${card.en}</div>
        </div>
      `;
    });

    // Reading sections
    const sections = document.getElementById('readingSections');
    sections.innerHTML = '';
    const readingTexts = [
      drawnCards[0].past,
      drawnCards[1].present,
      drawnCards[2].future
    ];
    drawnCards.forEach((card, i) => {
      sections.innerHTML += `
        <div class="reading-section">
          <div class="reading-section-header">
            <span class="reading-section-icon">${posIcons[i]}</span>
            <span class="reading-section-title">${positions[i]} · ${posEN[i]}</span>
          </div>
          <div class="reading-section-card" style="color:${card.color}">
            ${card.icon} ${card.cn}（${card.en}）— ${card.theme}
          </div>
          <div class="reading-section-text">${readingTexts[i]}</div>
        </div>
      `;
    });

    // Overall reading
    const overall = generateOverall(drawnCards);
    document.getElementById('readingOverall').innerHTML = `
      <div class="reading-overall-title">✦ 命运综合解读 ✦</div>
      <div class="reading-overall-text">
        <span class="quote-mark">"</span>
        ${overall}
        <span class="quote-mark">"</span>
      </div>
    `;

    updateDots(4);
    showScreen('reading');
  }

    const readings = [
      `从${cards[0].cn}到${cards[1].cn}，再到${cards[2].cn}，你的命运轨迹如同维罗纳的星辰——充满激情、转折与深意。过去的经历塑造了今日的你，此刻的抉择将决定未来的走向。如同罗密欧与朱丽叶，爱与命运从不分离，你所经历的一切，都是灵魂成长的必经之路。`,
      `三张牌的组合揭示了一段深刻的内在旅程：${cards[0].cn}带来的过去经验，${cards[1].cn}指引的当下处境，以及${cards[2].cn}预示的未来可能。命运从不是固定的剧本，而是你与宇宙共同书写的诗篇。愿你如朱丽叶般勇敢，如星辰般明亮。`,
      `在这三牌阵中，${cards[0].cn}、${cards[1].cn}与${cards[2].cn}共同编织出你此刻的命运图景。过去的伤痕是智慧的印记，现在的困境是蜕变的契机，未来的光芒正在等待你去点亮。记住：即使是最悲壮的故事，也能化为永恒的传说。`,
      `命运之牌已然揭晓。${cards[0].cn}述说着你走过的路，${cards[1].cn}映照着你当下的心境，${cards[2].cn}则是宇宙为你预备的礼物。如同维罗纳的两颗星辰，你的故事独一无二，充满了只属于你的光与影。勇敢地活出属于自己的传奇。`
    ];

    return readings[Math.floor(Math.random() * readings.length)];
  }

  function restartReading() {
    shuffleCount = 0;
    drawnCards = [];
    flippedCount = 0;
    updateDots(1);
    showScreen('intro');
  }

  // ===== INIT =====
  createParticles();
</script>
